<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f7" />
  <title>PrivateLog</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div>
        <div class="eyebrow">PRIVATE JOURNAL · v0.2.3</div>
        <h1 id="pageTitle">Home</h1>
      </div>
      <button class="primary compact icon-button" id="quickAddBtn"><span aria-hidden="true">✚</span><span>Log encounter</span></button>
    </header>

    <main id="view"></main>

    <nav class="bottom-nav" aria-label="Main navigation">
      <button data-view="home" class="active"><b aria-hidden="true">⌂</b><span>Home</span></button>
      <button data-view="partners"><b aria-hidden="true">♙</b><span>People</span></button>
      <button data-view="timeline"><b aria-hidden="true">☷</b><span>Journal</span></button>
      <button data-view="calendar"><b aria-hidden="true">▦</b><span>Calendar</span></button>
      <button data-view="more"><b aria-hidden="true">☰</b><span>More</span></button>
    </nav>
  </div>

  <dialog id="modal">
    <form method="dialog" class="modal-card" id="modalContent"></form>
  </dialog>

  <input type="file" id="importFile" accept="application/json" hidden />
  <script src="app.js"></script>
</body>
</html>
